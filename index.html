<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Memory Card</title>
  <style>
    :root {
      --bg-1: #300914;
      --bg-2: #4a1020;
      --wine: #6d1830;
      --rose: #b73f62;
      --blush: #efc7d2;
      --cream: #fff7f2;
      --paper: #fff9f1;
      --gold: #cba45a;
      --gold-soft: #efdba7;
      --ink: #2f1713;
      --muted: rgba(255, 247, 242, 0.72);
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.38);
      --radius: 18px;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 15% 20%, rgba(239, 199, 210, 0.08), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(203, 164, 90, 0.10), transparent 24%),
        radial-gradient(circle at 70% 75%, rgba(183, 63, 98, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, #23040c 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.22;
    }

    body::before {
      left: -120px;
      top: 80px;
      background: rgba(239, 199, 210, 0.28);
      animation: drift 12s ease-in-out infinite;
    }

    body::after {
      right: -120px;
      bottom: 40px;
      background: rgba(203, 164, 90, 0.18);
      animation: drift 14s ease-in-out infinite reverse;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-18px) translateX(12px); }
    }

    .sparkles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .sparkles span {
      position: absolute;
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0));
      opacity: .32;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { transform: translateY(0) scale(.8); opacity: .18; }
      50% { transform: translateY(-16px) scale(1.25); opacity: .5; }
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 46px 0 72px;
    }

    .hero {
      text-align: center;
      padding: 20px 10px 26px;
      animation: fadeUp .8s var(--ease) both;
    }

    .eyebrow {
      display: inline-block;
      font-size: 11px;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 16px;
      opacity: .92;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: .01em;
      text-shadow: 0 10px 28px rgba(0, 0, 0, .24);
    }

    .hero h1 em {
      color: var(--blush);
      font-style: italic;
    }

    .hero p {
      margin: 14px auto 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .deck-shell {
      position: relative;
      margin-top: 24px;
      padding: 30px 18px 10px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 26px 60px rgba(0,0,0,.16);
      backdrop-filter: blur(10px);
    }

    .deck-shell::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 24px;
      border: 1px dashed rgba(239, 219, 167, 0.14);
      pointer-events: none;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 24px;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    .card-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      cursor: pointer;
      perspective: 1400px;
      animation: fadeUp .7s var(--ease) both;
    }

    .card-wrap:nth-child(1){ animation-delay:.08s; }
    .card-wrap:nth-child(2){ animation-delay:.16s; }
    .card-wrap:nth-child(3){ animation-delay:.24s; }
    .card-wrap:nth-child(4){ animation-delay:.32s; }
    .card-wrap:nth-child(5){ animation-delay:.40s; }
    .card-wrap:nth-child(6){ animation-delay:.48s; }

    .card-wrap:hover { z-index: 4; }

    .card-wrap.is-open { z-index: 9; }

    .card-wrap::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: -16px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .34);
      filter: blur(12px);
      transform: scale(.85);
      transition: opacity .5s var(--ease), transform .5s var(--ease);
      opacity: .34;
      z-index: -1;
    }

    .card-wrap:hover::after,
    .card-wrap.is-open::after {
      opacity: .48;
      transform: scale(1);
    }

    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform .95s var(--ease);
    }

    .card-wrap:hover .card-inner {
      transform: translateY(-8px) rotateX(2deg);
    }

    .card-wrap.is-open .card-inner {
      transform: rotateY(180deg) translateY(-6px);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: var(--shadow);
    }

    .card-back {
      background:
        radial-gradient(circle at center, rgba(239, 219, 167, .15), transparent 34%),
        linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,0)),
        linear-gradient(135deg, #7b1734 0%, #591125 50%, #390813 100%);
      border: 1px solid rgba(239, 219, 167, .18);
      display: grid;
      place-items: center;
    }

    .card-back::before,
    .card-back::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 12px;
      border: 1px solid rgba(239, 219, 167, .28);
    }

    .card-back::after {
      inset: 22px;
      border-color: rgba(239, 219, 167, .18);
    }

    .ornament {
      position: relative;
      width: 74%;
      height: 84%;
      border-radius: 14px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .ornament::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(239, 219, 167, .18), transparent 24%),
        linear-gradient(90deg, transparent 49.5%, rgba(239,219,167,.22) 50%, transparent 50.5%),
        linear-gradient(transparent 49.5%, rgba(239,219,167,.18) 50%, transparent 50.5%);
      opacity: .95;
    }

    .mini-hearts,
    .mini-hearts::before,
    .mini-hearts::after {
      content: "♥";
      position: absolute;
      color: rgba(239, 219, 167, .9);
      font-size: 18px;
      text-shadow: 0 0 10px rgba(239, 219, 167, .2);
    }

    .mini-hearts { top: 18px; left: 50%; transform: translateX(-50%); }
    .mini-hearts::before { top: 116px; left: -86px; }
    .mini-hearts::after { top: 116px; left: 72px; }

    .crest {
      position: relative;
      z-index: 1;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 1px solid rgba(239, 219, 167, .4);
      display: grid;
      place-items: center;
      color: var(--gold-soft);
      font-size: 2.4rem;
      background: radial-gradient(circle, rgba(255,255,255,.10), transparent 70%);
      box-shadow: inset 0 0 20px rgba(255,255,255,.05);
    }

    .card-front {
      transform: rotateY(180deg);
      color: var(--ink);
      border: 1px solid rgba(203, 164, 90, .16);
      background:
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.18)),
        linear-gradient(135deg, var(--theme-light) 0%, #fff6ef 100%);
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-front::before,
    .card-front::after {
      content: attr(data-rank);
      position: absolute;
      font-size: 16px;
      line-height: 1;
      color: var(--theme-accent);
      font-weight: 700;
    }

    .card-front::before { top: 12px; left: 12px; }
    .card-front::after { right: 12px; bottom: 12px; transform: rotate(180deg); }

    .front-top,
    .front-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .9rem;
      color: rgba(47,23,19,.58);
    }

    .front-center {
      text-align: center;
      padding: 8px 4px;
    }

    .front-suit {
      font-size: clamp(2.9rem, 6vw, 4.3rem);
      line-height: 1;
      filter: drop-shadow(0 6px 18px rgba(183,63,98,.18));
      transform-origin: center;
      transition: transform .35s ease;
    }

    .card-wrap:hover .front-suit,
    .card-wrap.is-open .front-suit {
      transform: scale(1.06);
    }

    .front-title {
      margin-top: 10px;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--theme-accent);
    }

    .front-tag {
      margin-top: 8px;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(47,23,19,.48);
    }

    .peek-note {
      position: absolute;
      left: 50%;
      bottom: 10px;
      width: 88%;
      padding: 16px 16px 12px;
      border-radius: 14px 14px 10px 10px;
      transform: translateX(-50%) translateY(86%) scale(.95);
      transform-origin: bottom center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,251,245,.96)),
        linear-gradient(transparent 93%, rgba(183,63,98,.06) 93%);
      box-shadow: 0 18px 30px rgba(0,0,0,.18);
      border: 1px solid rgba(203,164,90,.15);
      opacity: 0;
      pointer-events: none;
      transition: transform .72s var(--ease), opacity .52s ease;
    }

    .card-wrap.is-open:hover .peek-note,
    .card-wrap.is-open:focus-within .peek-note {
      opacity: 1;
      transform: translateX(-50%) translateY(22%) scale(1);
    }

    .peek-note::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 16px;
      border-radius: 3px;
      background: rgba(239, 219, 167, .82);
      box-shadow: 0 4px 10px rgba(0,0,0,.08);
    }

    .peek-kicker {
      color: rgba(47,23,19,.48);
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .peek-title {
      color: var(--ink);
      font-size: .98rem;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .peek-line {
      display: flex;
      gap: 8px;
      color: rgba(47,23,19,.66);
      font-size: .74rem;
      line-height: 1.45;
    }

    .peek-line strong {
      min-width: 42px;
      color: var(--theme-accent);
      font-size: .68rem;
      letter-spacing: .03em;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 10px 16px;
      flex-wrap: wrap;
      margin-top: 28px;
      color: rgba(255,247,242,.64);
      font-size: .88rem;
    }

    .legend span {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(19, 3, 8, .72);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
      z-index: 20;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .paper {
      width: min(100%, 500px);
      max-height: min(86vh, 860px);
      overflow: auto;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.74), rgba(255,255,255,.2)),
        repeating-linear-gradient(
          to bottom,
          rgba(183,63,98,.065) 0,
          rgba(183,63,98,.065) 1px,
          transparent 1px,
          transparent 34px
        ),
        var(--paper);
      border-radius: 8px;
      padding: 52px 32px 28px;
      box-shadow: 0 30px 90px rgba(0,0,0,.36);
      transform: translateY(28px) scale(.96);
      transition: transform .55s var(--ease);
      position: relative;
      border: 1px solid rgba(203,164,90,.22);
      scrollbar-width: thin;
    }

    .modal.open .paper {
      transform: translateY(0) scale(1);
    }

    .paper::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 66px;
      height: 24px;
      border-radius: 3px;
      background: linear-gradient(135deg, rgba(239,219,167,.92), rgba(203,164,90,.72));
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }

    .paper::after {
      content: "♥";
      position: absolute;
      right: 24px;
      top: 24px;
      color: rgba(183,63,98,.24);
      font-size: 1.25rem;
    }

    .paper-kicker {
      font-size: .68rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 10px;
    }

    .paper h2 {
      margin: 0 0 6px;
      font-size: clamp(2rem, 5vw, 2.5rem);
      line-height: 1.04;
    }

    .paper h2 em {
      color: var(--rose);
      font-style: italic;
    }

    .paper-subtitle {
      margin: 0;
      color: rgba(47,23,19,.58);
      font-size: 1.05rem;
      line-height: 1.65;
      font-style: italic;
    }

    .paper-divider {
      height: 1px;
      margin: 18px 0 18px;
      background: linear-gradient(to right, transparent, rgba(203,164,90,.85), transparent);
    }

    .schedule {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    .schedule li {
      display: grid;
      grid-template-columns: 72px 10px 1fr;
      gap: 12px;
      align-items: start;
      opacity: 0;
      transform: translateX(-8px);
      animation: slideIn .45s ease forwards;
    }

    .schedule li:nth-child(1){ animation-delay:.16s; }
    .schedule li:nth-child(2){ animation-delay:.24s; }
    .schedule li:nth-child(3){ animation-delay:.32s; }
    .schedule li:nth-child(4){ animation-delay:.40s; }
    .schedule li:nth-child(5){ animation-delay:.48s; }
    .schedule li:nth-child(6){ animation-delay:.56s; }

    .time {
      color: var(--rose);
      font-size: .76rem;
      letter-spacing: .06em;
      padding-top: 3px;
    }

    .dot {
      width: 8px;
      height: 8px;
      margin-top: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 6px rgba(203,164,90,.10);
    }

    .detail strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .detail span {
      color: rgba(47,23,19,.62);
      font-size: .92rem;
      line-height: 1.6;
    }

    .paper-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px dashed rgba(183,63,98,.22);
      flex-wrap: wrap;
    }

    .paper-note {
      color: rgba(47,23,19,.55);
      font-style: italic;
      font-size: .96rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
    }

    .btn {
      padding: 11px 16px;
      border-radius: 999px;
      transition: transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--rose);
      color: #fff;
      box-shadow: 0 10px 24px rgba(183,63,98,.22);
    }

    .btn-primary:hover { background: #9f3151; }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(183,63,98,.25);
      color: var(--rose);
    }

    .paper-image-wrap {
      margin: 14px 0 0;
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
      max-height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(239,199,210,.12);
      border: 1px solid rgba(203,164,90,.14);
    }

    .paper-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-radius: 10px;
    }

    /* Lock overlay on cards */
    .card-wrap.is-locked::before {
      content: "🔒";
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      background: rgba(19,3,8,.55);
      border-radius: var(--radius);
      backdrop-filter: blur(3px);
      pointer-events: none;
      display: grid;
      place-items: center;
    }

    .card-wrap.is-locked {
      cursor: not-allowed;
      filter: brightness(0.7);
    }

    /* Password prompt modal */
    .pw-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(19,3,8,.78);
      backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
      z-index: 30;
    }

    .pw-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .pw-box {
      background: var(--paper);
      color: var(--ink);
      border-radius: 20px;
      padding: 36px 28px 28px;
      width: min(100%, 340px);
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,.40);
      border: 1px solid rgba(203,164,90,.22);
      transform: translateY(20px) scale(.96);
      transition: transform .4s var(--ease);
    }

    .pw-overlay.open .pw-box {
      transform: translateY(0) scale(1);
    }

    .pw-lock-icon {
      font-size: 2.6rem;
      margin-bottom: 14px;
      display: block;
    }

    .pw-box h3 {
      margin: 0 0 6px;
      font-size: 1.25rem;
      color: var(--ink);
    }

    .pw-box p {
      margin: 0 0 18px;
      font-size: .92rem;
      color: rgba(47,23,19,.58);
      font-style: italic;
      line-height: 1.6;
    }

    .pw-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1.5px solid rgba(183,63,98,.28);
      font: inherit;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: .3em;
      background: rgba(253,229,234,.3);
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }

    .pw-input:focus { border-color: var(--rose); }

    .pw-input.shake {
      animation: shake .35s ease;
      border-color: #c0392b;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .pw-error {
      color: #c0392b;
      font-size: .82rem;
      margin: 8px 0 0;
      min-height: 18px;
    }

    .pw-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      justify-content: center;
    }

    .pw-remaining {
      font-size: .78rem;
      color: rgba(47,23,19,.44);
      margin-top: 14px;
    }

    .hero p em {
      color: var(--blush);
      font-style: italic;
    }

    .tips {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.75;
      font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
      animation: fadeUp .9s var(--ease) both .54s;
      padding: 0 16px;
    }

    .float-heart {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 25;
      font-size: 18px;
      animation: rise 1.6s ease-out forwards;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.18));
      user-select: none;
    }

    @keyframes rise {
      0% { opacity: 0; transform: translateY(0) scale(.6) rotate(0deg); }
      10% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-150px) scale(1.15) rotate(14deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 740px) {
      .page { width: min(100% - 20px, 1160px); }
      .deck-shell { padding: 20px 12px 6px; }
      .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }

    const grid = document.getElementById('cardsGrid');
    const modal = document.getElementById('modal');
    const paperTitle = document.getElementById('paperTitle');
    const paperSubtitle = document.getElementById('paperSubtitle');
    const paperKicker = document.getElementById('paperKicker');
    const paperNote = document.getElementById('paperNote');
    const paperImage = document.getElementById('paperImage');
    const defaultPaperImageSrc = paperImage.getAttribute('src');
    const scheduleList = document.getElementById('scheduleList');
    const closeBtn = document.getElementById('closeBtn');
    const flipBackBtn = document.getElementById('flipBackBtn');
    const pwOverlay = document.getElementById('pwOverlay');
    const pwInput = document.getElementById('pwInput');
    const pwError = document.getElementById('pwError');
    const pwSubmitBtn = document.getElementById('pwSubmitBtn');
    const pwCancelBtn = document.getElementById('pwCancelBtn');
    const pwMessage = document.getElementById('pwMessage');
    const pwRemaining = document.getElementById('pwRemaining');

    // ── Lock system ──────────────────────────────────────────────
    const LOCK_KEY = 'deckLockData_v1';
    const LOCK_MS = 7 * 24 * 60 * 60 * 1000;  // 3 hari
    const PASSWORD = '243';

    function getLockData() {
      try { return JSON.parse(localStorage.getItem(LOCK_KEY)) || null; }
      catch { return null; }
    }

    function saveLockData(cardIndex) {
      localStorage.setItem(LOCK_KEY, JSON.stringify({ cardIndex, openedAt: Date.now() }));
    }

    function isLockActive() {
      const d = getLockData();
      if (!d) return false;
      const elapsed = Date.now() - d.openedAt;
      if (elapsed >= LOCK_MS) { localStorage.removeItem(LOCK_KEY); return false; }
      return true;
    }

    function lockedCardIndex() {
      const d = getLockData();
      return d ? d.cardIndex : null;
    }

    function getRemainingText() {
      const d = getLockData();
      if (!d) return '';
      const rem = LOCK_MS - (Date.now() - d.openedAt);
      const h   = Math.floor(rem / 3600000);
      const m   = Math.floor((rem % 3600000) / 60000);
      return `Bisa dibuka lagi dalam ${h} jam ${m} menit`;
    }

    function applyLockVisuals() {
      const locked = isLockActive();
      const openIdx = lockedCardIndex();
      document.querySelectorAll('.card-wrap').forEach((wrap, i) => {
        if (locked && i !== openIdx) {
          wrap.classList.add('is-locked');
        } else {
          wrap.classList.remove('is-locked');
        }
      });
    }

    // ── Password prompt ──────────────────────────────────────────
    let pendingUnlockIndex = null;
    let pendingUnlockWrap  = null;

    function showPasswordPrompt(index, wrap) {
      pendingUnlockIndex = index;
      pendingUnlockWrap  = wrap;
      pwInput.value = '';
      pwError.textContent = '';
      pwRemaining.textContent = getRemainingText();
      pwOverlay.classList.add('open');
      setTimeout(() => pwInput.focus(), 100);
    }

    function hidePasswordPrompt() {
      pwOverlay.classList.remove('open');
      pendingUnlockIndex = null;
      pendingUnlockWrap  = null;
    }

    function tryPassword() {
      if (pwInput.value === PASSWORD) {
        // Unlock: remove lock data and proceed
        localStorage.removeItem(LOCK_KEY);
        hidePasswordPrompt();
        applyLockVisuals();
        // Now open the card that was pending
        if (pendingUnlockIndex !== null) {
          const idx  = pendingUnlockIndex;
          const wrap = pendingUnlockWrap;
          pendingUnlockIndex = null;
          pendingUnlockWrap  = null;
          proceedOpenCard(idx, wrap);
        }
      } else {
        pwInput.classList.add('shake');
        pwError.textContent = 'Password salah, coba lagi.';
        setTimeout(() => pwInput.classList.remove('shake'), 400);
        pwInput.value = '';
      }
    }

    pwSubmitBtn.addEventListener('click', tryPassword);
    pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryPassword(); });
    pwCancelBtn.addEventListener('click', hidePasswordPrompt);
    pwOverlay.addEventListener('click', (e) => { if (e.target === pwOverlay) hidePasswordPrompt(); });

    let activeIndex = null;
    let modalIndex = null;

    function buildSparkles() {
      const wrap = document.getElementById('sparkles');
      for (let i = 0; i < 24; i++) {
        const s = document.createElement('span');
        s.style.left = `${Math.random() * 100}%`;
        s.style.top = `${Math.random() * 100}%`;
        s.style.animationDuration = `${5 + Math.random() * 8}s`;
        s.style.animationDelay = `${Math.random() * 5}s`;
        s.style.opacity = (0.14 + Math.random() * 0.3).toFixed(2);
        wrap.appendChild(s);
      }
    }

    function buildCards() {
      grid.innerHTML = '';
      cards.forEach((card, index) => {
        const wrap = document.createElement('article');
        wrap.className = 'card-wrap';
        wrap.style.setProperty('--theme-accent', card.accent);
        wrap.style.setProperty('--theme-light', card.light);
        wrap.innerHTML = `
          <div class="card-inner">
            <section class="card-face card-back" aria-label="Back of card">
              <div class="ornament">
                <span class="mini-hearts"></span>
                <div class="crest">♥</div>
              </div>
            </section>
            <section class="card-face card-front" data-rank="${card.rank}" aria-label="${card.title}">
              <div class="front-top"><span>${card.rank}</span><span>${card.theme}</span></div>
              <div class="front-center">
                <div class="front-suit">${card.suit}</div>
                <div class="front-title">${card.title}</div>
                <div class="front-tag">${card.theme}</div>
              </div>
              <div class="front-bottom"><span>${card.suit}</span><span></span></div>
            </section>
          </div>
          <div class="peek-note" aria-hidden="true">
            <div class="peek-kicker">little schedule</div>
            <div class="peek-title">${card.title}</div>
            ${card.preview.map(item => `<div class="peek-line"><strong>${item[0]}</strong><span>${item[1]}</span></div>`).join('')}
          </div>
        `;

        wrap.addEventListener('click', () => handleCard(index, wrap));
        grid.appendChild(wrap);
      });
    }

    function handleCard(index, wrap) {
      // Check if this card is locked
      if (isLockActive() && index !== lockedCardIndex()) {
        showPasswordPrompt(index, wrap);
        return;
      }
      if (activeIndex === index) {
        openModal(index);
        return;
      }
      proceedOpenCard(index, wrap);
    }

    function proceedOpenCard(index, wrap) {
      document.querySelectorAll('.card-wrap').forEach(card => card.classList.remove('is-open'));
      wrap.classList.add('is-open');
      activeIndex = index;
      burst(wrap, cards[index].suit);
    }

    function burst(target, symbol) {
      const rect = target.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const choices = ['♥', '♡', '✦', symbol || '♥'];

      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'float-heart';
        el.textContent = choices[Math.floor(Math.random() * choices.length)];
        el.style.left = `${centerX + (Math.random() - .5) * 110}px`;
        el.style.top = `${centerY + (Math.random() - .5) * 40}px`;
        el.style.fontSize = `${14 + Math.random() * 16}px`;
        el.style.animationDuration = `${1.2 + Math.random() * .9}s`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function openModal(index) {
      saveLockData(index); // simpan kartu yang dibuka, kunci yang lain
      applyLockVisuals();
      modalIndex = index;
      const card = cards[index];
      paperKicker.textContent = card.kicker;
      const words = card.title.split(' ');
      const last = words.pop();
      paperTitle.innerHTML = `${words.join(' ')} <em>${last}</em>`;
      paperSubtitle.textContent = card.subtitle;
      paperNote.textContent = card.note;
      paperImage.src = card.image || defaultPaperImageSrc;
      paperImage.alt = card.title + ' illustration';
      scheduleList.innerHTML = card.schedule.map(item => `
        <li>
          <div class="time">${item.time}</div>
          <div class="dot"></div>
          <div class="detail">
            <strong>${item.label}</strong>
            <span>${item.desc}</span>
          </div>
        </li>
      `).join('');
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    function flipBack() {
      closeModal();
      document.querySelectorAll('.card-wrap').forEach(card => card.classList.remove('is-open'));
      activeIndex = null;
      modalIndex = null;
    }

    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    closeBtn.addEventListener('click', closeModal);
    flipBackBtn.addEventListener('click', flipBack);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });

    buildSparkles();
    buildCards();
    applyLockVisuals();

    // ══════════════════════════════════════════════
    //  LUXURY PARTICLE CANVAS
    // ══════════════════════════════════════════════
    (function() {
      const canvas = document.getElementById('luxCanvas');
      const ctx    = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      const SHAPES = ['♥', '✦', '·', '✧', '˚'];
      const COLORS = [
        'rgba(239,199,210,',  // blush
        'rgba(203,164, 90,',  // gold
        'rgba(183, 63, 98,',  // rose
        'rgba(255,255,255,',  // white
      ];

      function Particle() {
        this.reset = function() {
          this.x     = Math.random() * W;
          this.y     = H + 20;
          this.vx    = (Math.random() - .5) * .4;
          this.vy    = -(0.18 + Math.random() * 0.36);
          this.size  = 6 + Math.random() * 10;
          this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
          this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
          this.alpha = 0;
          this.life  = 0;
          this.maxLife = 180 + Math.random() * 200;
          this.wobble = Math.random() * Math.PI * 2;
          this.wobbleSpeed = 0.012 + Math.random() * 0.014;
        };
        this.reset();
        this.y = Math.random() * H; // scatter initial position
        this.life = Math.random() * this.maxLife;
      }

      for (let i = 0; i < 55; i++) particles.push(new Particle());

      function tick() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          p.life++;
          p.wobble += p.wobbleSpeed;
          p.x += p.vx + Math.sin(p.wobble) * 0.28;
          p.y += p.vy;

          const progress = p.life / p.maxLife;
          p.alpha = progress < .15 ? progress / .15 :
                    progress > .75 ? (1 - progress) / .25 : 1;
          p.alpha *= .22;

          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle   = p.color + p.alpha + ')';
          ctx.font        = `${p.size}px Georgia, serif`;
          ctx.textAlign   = 'center';
          ctx.textBaseline= 'middle';
          ctx.fillText(p.shape, p.x, p.y);
          ctx.restore();

          if (p.life >= p.maxLife || p.y < -30) p.reset();
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();

    // ══════════════════════════════════════════════
    //  CUSTOM LOVE CURSOR + TRAIL
    // ══════════════════════════════════════════════
    (function() {
      const cursor = document.getElementById('loveCursor');
      if (!cursor) return;

      // Only activate on true pointer devices
      if (!window.matchMedia('(pointer: fine)').matches) return;

      let mx = -200, my = -200;
      let trail = [];
      const TRAIL_MAX = 10;

      document.addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        cursor.style.left = mx + 'px';
        cursor.style.top  = my + 'px';

        // Spawn trail particle occasionally
        if (Math.random() > 0.5) spawnTrail(mx, my);
      });

      function spawnTrail(x, y) {
        const el = document.createElement('div');
        el.textContent = Math.random() > .5 ? '♥' : '✦';
        const size = 6 + Math.random() * 8;
        el.style.cssText = `
          position:fixed;
          left:${x}px;
          top:${y}px;
          font-size:${size}px;
          color:rgba(${Math.random()>.5?'183,63,98':'203,164,90'},${(0.15+Math.random()*.2).toFixed(2)});
          pointer-events:none;
          z-index:9998;
          transform:translate(-50%,-50%);
          transition:opacity .7s ease, transform .7s ease;
          user-select:none;
          will-change:transform,opacity;
        `;
        document.body.appendChild(el);

        requestAnimationFrame(() => {
          el.style.opacity = '0';
          el.style.transform = `translate(${-50 + (Math.random()-0.5)*30}%, ${-50 - 20 - Math.random()*30}%)`;
        });

        setTimeout(() => el.remove(), 750);
      }
    })();
  </script>
</body>
